name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers for health checks
      run: npx playwright install --with-deps chromium webkit

    - name: Run IO integration health checks
      run: npm run health:io

    - name: Run runtime console health checks (desktop + mobile)
      run: |
        npm run health:runtime
        npm run health:runtime:mobile

    - name: Run tests
      run: npm run test

    - name: Build frontend
      run: npm run build
      env:
        VITE_APP_ENVIRONMENT: production
        VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

    - name: Build backend
      run: |
        cd backend
        npm ci
        npm run build

    - name: Resolve deploy target
      id: deploy-target
      env:
        RAW_DEPLOY_PLATFORM: ${{ vars.DEPLOY_PLATFORM }}
      run: |
        PLATFORM="${RAW_DEPLOY_PLATFORM}"
        if [ -z "$PLATFORM" ]; then
          PLATFORM="none"
        fi
        echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"

    - name: Validate deploy target
      env:
        DEPLOY_PLATFORM: ${{ steps.deploy-target.outputs.platform }}
      run: |
        case "$DEPLOY_PLATFORM" in
          railway|render|aws)
            echo "Deploy target: $DEPLOY_PLATFORM"
            ;;
          *)
            echo "Invalid DEPLOY_PLATFORM: '$DEPLOY_PLATFORM'"
            echo "Configure repository variable DEPLOY_PLATFORM as one of: railway, render, aws"
            exit 1
            ;;
        esac

    - name: Deployment preflight summary
      env:
        DEPLOY_PLATFORM: ${{ steps.deploy-target.outputs.platform }}
        DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        HAS_SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        HAS_SENTRY_DSN: ${{ secrets.SENTRY_DSN != '' }}
      run: |
        echo "=== DEPLOY PREFLIGHT ==="
        echo "Repository: ${{ github.repository }}"
        echo "Actor: ${{ github.actor }}"
        echo "Environment: $DEPLOY_ENVIRONMENT"
        echo "Platform: $DEPLOY_PLATFORM"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "Secrets check (boolean only):"
        echo "  - SENTRY_DSN configured: $HAS_SENTRY_DSN"
        echo "  - SLACK_WEBHOOK_URL configured: $HAS_SLACK_WEBHOOK"
        echo "========================"

    - name: Validate Railway secrets
      if: ${{ steps.deploy-target.outputs.platform == 'railway' }}
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        if [ -z "$RAILWAY_TOKEN" ]; then
          echo "Missing required secret: RAILWAY_TOKEN"
          exit 1
        fi

    - name: Validate Render secrets
      if: ${{ steps.deploy-target.outputs.platform == 'render' }}
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        if [ -z "$RENDER_API_KEY" ]; then
          echo "Missing required secret: RENDER_API_KEY"
          exit 1
        fi
        if [ -z "$RENDER_SERVICE_ID" ]; then
          echo "Missing required secret: RENDER_SERVICE_ID"
          exit 1
        fi

    - name: Validate AWS secrets
      if: ${{ steps.deploy-target.outputs.platform == 'aws' }}
      env:
        AWS_ECS_CLUSTER: ${{ secrets.AWS_ECS_CLUSTER }}
        AWS_ECS_SERVICE: ${{ secrets.AWS_ECS_SERVICE }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: |
        if [ -z "$AWS_ECS_CLUSTER" ]; then
          echo "Missing required secret: AWS_ECS_CLUSTER"
          exit 1
        fi
        if [ -z "$AWS_ECS_SERVICE" ]; then
          echo "Missing required secret: AWS_ECS_SERVICE"
          exit 1
        fi
        if [ -z "$AWS_REGION" ]; then
          echo "Missing required secret: AWS_REGION"
          exit 1
        fi

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.frontend
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN }}

    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Railway
      if: ${{ steps.deploy-target.outputs.platform == 'railway' }}
      run: |
        curl -X POST \
          -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
          -H "Content-Type: application/json" \
          https://backboard.railway.app/graphql \
          -d '{
            "query": "mutation { deploy }",
            "variables": {}
          }'

    - name: Deploy to Render
      if: ${{ steps.deploy-target.outputs.platform == 'render' }}
      run: |
        curl -X POST \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          -H "Content-Type: application/json" \
          https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
          -d '{}'

    - name: Deploy to AWS ECS
      if: ${{ steps.deploy-target.outputs.platform == 'aws' }}
      run: |
        aws ecs update-service \
          --cluster ${{ secrets.AWS_ECS_CLUSTER }} \
          --service ${{ secrets.AWS_ECS_SERVICE }} \
          --force-new-deployment \
          --region ${{ secrets.AWS_REGION }}

    - name: Notify deployment success
      if: success()
      run: |
        if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
          echo "SLACK_WEBHOOK_URL not configured. Skipping success notification."
          exit 0
        fi
        curl -X POST \
          -H 'Content-type: application/json' \
          --data '{"text":"${{ format('🚀 Flow Finance deployed successfully to {0}', github.event.inputs.environment || 'production') }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Notify deployment failure
      if: failure()
      run: |
        if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
          echo "SLACK_WEBHOOK_URL not configured. Skipping failure notification."
          exit 0
        fi
        curl -X POST \
          -H 'Content-type: application/json' \
          --data '{"text":"${{ format('❌ Flow Finance deployment failed to {0}', github.event.inputs.environment || 'production') }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}