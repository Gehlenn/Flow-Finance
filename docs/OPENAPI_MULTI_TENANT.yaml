openapi: 3.1.0
info:
  title: Flow Finance Multi-Tenant API
  version: 0.10.0
  description: |
    Contrato de APIs auxiliares do backend. O source of truth atual de tenancy, membership,
    entidades financeiras, billing state, usage, billing hooks e audit log fica em Firestore.
servers:
  - url: http://localhost:3001
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WorkspaceHeader:
      name: X-Workspace-Id
      in: header
      required: false
      schema:
        type: string
      description: |
        Workspace ativo da sessao. No fluxo atual, o frontend resolve e persiste esse contexto a partir do Firestore.
  schemas:
    WorkspaceSummary:
      type: object
      required: [workspaceId, tenantId, name, plan, role, isDefault]
      properties:
        workspaceId:
          type: string
        tenantId:
          type: string
        tenantName:
          type: string
        name:
          type: string
        plan:
          type: string
          enum: [free, pro]
        role:
          type: string
          enum: [owner, admin, member, viewer]
        isDefault:
          type: boolean
    AuditLogEntry:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        workspaceId: { type: string }
        userId: { type: string }
        action: { type: string }
        resourceType: { type: string }
        resourceId: { type: string }
        metadata:
          type: object
          additionalProperties: true
        at:
          type: string
          format: date-time
    BusinessIntegrationResult:
      type: object
      required: [ok, workspaceId, sourceSystem, externalRecordId, action, entity, storedAs]
      properties:
        ok:
          type: boolean
          enum: [true]
        workspaceId:
          type: string
        sourceSystem:
          type: string
        externalRecordId:
          type: string
        action:
          type: string
          enum: [created, updated, replayed]
        entity:
          type: string
          enum: [transaction, reminder]
        storedAs:
          type: string
          enum: [transactions, reminders]
    BusinessIntegrationErrorResponse:
      type: object
      required: [ok, error, message]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
          enum: [validation_error, unauthorized, forbidden, integration_unavailable]
        message:
          type: string
    BusinessIntegrationTransactionRequest:
      type: object
      required: [workspaceId, sourceSystem, externalRecordId, type, amount, currency, occurredAt, description, status]
      properties:
        workspaceId:
          type: string
        sourceSystem:
          type: string
        externalRecordId:
          type: string
        integrationId:
          type: string
        externalCustomerId:
          type: string
          description: Referência técnica externa. Não enviar CPF, email ou telefone.
        type:
          type: string
          enum: [income, expense, receivable, payable]
          description: Receivable/payable representam valores que podem permanecer em aberto antes da confirmação.
        amount:
          type: number
          exclusiveMinimum: 0
        currency:
          type: string
          pattern: ^[A-Z]{3}$
        occurredAt:
          type: string
          format: date-time
        description:
          type: string
        status:
          type: string
          enum: [confirmed, pending, overdue]
          description: Income/expense exigem confirmed. Receivable/payable em pending/overdue são materializados como reminders.
        category:
          type: string
        subcategory:
          type: string
        counterpartyLabel:
          type: string
        notes:
          type: string
        dueAt:
          type: string
          format: date-time
          description: Obrigatório para receivable/payable com status pending/overdue.
        referenceDate:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
              - type: 'null'
    BusinessIntegrationReminderRequest:
      type: object
      required: [workspaceId, sourceSystem, externalRecordId, title, remindAt, kind, status]
      properties:
        workspaceId:
          type: string
        sourceSystem:
          type: string
        externalRecordId:
          type: string
        title:
          type: string
        remindAt:
          type: string
          format: date-time
        kind:
          type: string
          enum: [financial, operational]
        status:
          type: string
          enum: [active, completed, canceled]
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        relatedTransactionExternalId:
          type: string
        integrationId:
          type: string
        externalCustomerId:
          type: string
          description: Referência técnica externa. Não enviar CPF, email ou telefone.
        metadata:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
              - type: 'null'
paths:
  /api/workspace:
    get:
      security:
        - bearerAuth: []
      summary: Lista workspaces disponiveis para o usuario autenticado.
      responses:
        '200':
          description: Workspace list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspaces:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkspaceSummary'
    post:
      security:
        - bearerAuth: []
      summary: Cria um novo workspace. Sem `tenantId`, cria um novo tenant com workspace padrao.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                tenantId:
                  type: string
      responses:
        '201':
          description: Workspace criado.
  /api/workspace/{workspaceId}/users:
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
      summary: Lista membros do workspace.
      responses:
        '200':
          description: Lista de membros.
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
      summary: Adiciona membro ao workspace. Requer `owner` ou `admin`.
      responses:
        '201':
          description: Membro adicionado.
  /api/workspace/{workspaceId}/users/{userId}:
    delete:
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
      summary: Remove membro do workspace. Requer `owner` ou `admin`.
      responses:
        '204':
          description: Membro removido.
  /api/tenant:
    post:
      summary: Cria um tenant com seu workspace padrao.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, ownerUserId]
              properties:
                name:
                  type: string
                ownerUserId:
                  type: string
      responses:
        '201':
          description: Tenant criado.
  /api/tenant/select:
    post:
      summary: Seleciona o tenant ativo da sessao e persiste o workspace padrao.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId]
              properties:
                tenantId:
                  type: string
      responses:
        '200':
          description: Tenant selecionado.
  /api/admin/audit-logs:
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
      summary: Consulta audit logs do workspace ativo.
      responses:
        '200':
          description: Audit log page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLogEntry'
                  nextCursor:
                    type: object
                    nullable: true
                    properties:
                      createdAt:
                        type: string
                        format: date-time
                      id:
                        type: string
  /api/integrations/transactions:
    post:
      summary: Ingestão de transação leve para integração externa
      description: Confirmed entra como transaction. Receivable/payable em pending/overdue são materializados como reminders para evitar inflação de caixa confirmado.
      parameters:
        - name: x-integration-key
          in: header
          required: true
          schema:
            type: string
        - name: x-integration-timestamp
          in: header
          required: false
          schema:
            type: string
        - name: x-integration-signature
          in: header
          required: false
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: false
          description: Cabeçalho de compatibilidade para retries. Idempotência principal usa sourceSystem + externalRecordId.
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessIntegrationTransactionRequest'
      responses:
        '201':
          description: Registro criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationResult'
        '200':
          description: Registro atualizado ou replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationResult'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationErrorResponse'
        '401':
          description: Credencial inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationErrorResponse'
        '403':
          description: Chave não autorizada para workspace/sourceSystem
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationErrorResponse'
        '503':
          description: Integração não configurada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationErrorResponse'
  /api/integrations/reminders:
    post:
      summary: Ingestão de lembrete leve para integração externa
      parameters:
        - name: x-integration-key
          in: header
          required: true
          schema:
            type: string
        - name: x-integration-timestamp
          in: header
          required: false
          schema:
            type: string
        - name: x-integration-signature
          in: header
          required: false
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: false
          description: Cabeçalho de compatibilidade para retries. Idempotência principal usa sourceSystem + externalRecordId.
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessIntegrationReminderRequest'
      responses:
        '201':
          description: Registro criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationResult'
        '200':
          description: Registro atualizado ou replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationResult'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationErrorResponse'
        '401':
          description: Credencial inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationErrorResponse'
        '403':
          description: Chave não autorizada para workspace/sourceSystem
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationErrorResponse'
        '503':
          description: Integração não configurada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessIntegrationErrorResponse'
