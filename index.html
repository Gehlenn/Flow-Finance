    <title>Flow Finance — Controle de Caixa Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'pulse-wiggle': 'pulse-wiggle 6s ease-in-out infinite',
              'pulse-subtle': 'pulse-subtle 4s ease-in-out infinite',
              'float': 'float 5s ease-in-out infinite',
            },
            keyframes: {
              'pulse-wiggle': {
                '0%, 100%': { transform: 'scale(1) rotate(0deg)' },
                '25%': { transform: 'scale(1.005) rotate(0.2deg)' },
                '50%': { transform: 'scale(1) rotate(0deg)' },
                '75%': { transform: 'scale(1.005) rotate(-0.2deg)' },
              },
              'pulse-subtle': {
                '0%, 100%': { transform: 'scale(1)', opacity: '1' },
                '50%': { transform: 'scale(1.01)', opacity: '0.98' },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .dark body {
            background-color: #020617;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

<script>
  // PART 8 — Registrar Service Worker para suporte PWA/offline
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('[Flow] SW registrado:', reg.scope))
        .catch(err => console.warn('[Flow] SW falhou:', err));
    });
  }
</script>
